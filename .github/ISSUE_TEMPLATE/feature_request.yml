name: Feature request
description: Suggest a new listing format, option, or behaviour
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: If it's a new directory-listing format, link or paste an example listing.
